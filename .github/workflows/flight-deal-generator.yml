name: FlightDealGenerator

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  generate-deals:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Generate deals
      run: node flight-deal-generator.js
      
    - name: Results
      run: |
        echo "✅ Pages:"
        find output -name "*.html" | head -3
        echo "Total: $(find output -name '*.html' | wc -l)"
        
    - name: Ping search engines
      run: |
        curl -s "https://www.google.com/ping?sitemap=https://flights.yourdomain.com/output/sitemap-deals.xml" || true
        echo "✅ Pings sent"
