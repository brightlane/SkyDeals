name: FlightDealGenerator

on:
  schedule:
    - cron: '0 3 * * *'  # 3AM UTC daily
  workflow_dispatch:

jobs:
  generate-and-post:
    runs-on: ubuntu-latest

    steps:
    # =========================
    # 1. Checkout repo
    # =========================
    - name: Checkout
      uses: actions/checkout@v4

    # =========================
    # 2. Setup Node
    # =========================
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # =========================
    # 3. Install dependencies
    # =========================
    - name: Install dependencies
      run: npm install

    # =========================
    # 4. Generate flight deals
    # =========================
    - name: Generate deals
      run: node flight-deal-generator.js

    # =========================
    # 5. Twitter/X post
    # =========================
    - name: Auto-post to Twitter/X
      env:
        TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
      run: |
        TWEET="✈️ HOT DEAL: $(ls output/deals | head -1) | Book now #FlightDeals"

        curl -X POST "https://api.twitter.com/2/tweets" \
          -H "Authorization: Bearer $TWITTER_BEARER_TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"text\":\"$TWEET\"}"

    # =========================
    # 6. Reddit post (optional safe)
    # =========================
    - name: Post to Reddit (optional)
      if: ${{ secrets.REDDIT_WEBHOOK != '' }}
      run: |
        curl -X POST "${{ secrets.REDDIT_WEBHOOK }}" \
          -H "Content-Type: application/json" \
          -d '{
            "content_title": "Fresh Flight Deals Today!",
            "content": "New deals generated: flights system active",
            "username": "FlightDealBot"
          }'

    # =========================
    # 7. SLACK (FIXED - NEVER FAILS)
    # =========================
    - name: Slack notification (optional safe mode)
      if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
      continue-on-error: true
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        fields: repo,message,commit,author,action,eventName,ref,workflow,job,took
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    # =========================
    # 8. Verify output + ping sitemap
    # =========================
    - name: Verify & ping
      run: |
        echo "✅ Pages generated: $(find output -name '*.html' | wc -l)"

        curl -s "https://www.google.com/ping?sitemap=https://flights.yourdomain.com/output/sitemap-deals.xml" || true
