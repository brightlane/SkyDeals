name: FlightDealGenerator

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  generate-and-post:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Generate deals
      run: node flight-deal-generator.js

    # =========================
    # TWITTER
    # =========================
    - name: Post to Twitter/X
      env:
        TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
      run: |
        TWEET="✈️ HOT DEAL: $(ls output/deals | head -1) #FlightDeals"
        
        curl -X POST "https://api.twitter.com/2/tweets" \
          -H "Authorization: Bearer $TWITTER_BEARER_TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"text\":\"$TWEET\"}"

    # =========================
    # REDDIT (FIXED)
    # =========================
    - name: Reddit post (optional)
      if: ${{ secrets.REDDIT_WEBHOOK != '' }}
      run: |
        curl -X POST "${{ secrets.REDDIT_WEBHOOK }}" \
          -H "Content-Type: application/json" \
          -d '{
            "content_title": "Fresh Flight Deals Today!",
            "content": "New deals generated from system",
            "username": "FlightDealBot"
          }'

    # =========================
    # SLACK (FIXED)
    # =========================
    - name: Slack notification (optional)
      if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        fields: repo,message,commit,author,action,eventName,ref,workflow,job,took
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    # =========================
    # VERIFY
    # =========================
    - name: Verify output
      run: |
        echo "✅ Pages generated: $(find output -name '*.html' | wc -l)"
