name: Generate Daily Article

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"   # run once per day at midnight

jobs:
  generate-daily-article:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate pages
        run: node ./scripts/generateDailyArticle.js
