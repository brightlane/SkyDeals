name: Daily Skyscanner Empire

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: List files (debug)
      run: |
        echo "Files in repo:"
        ls -la *.js
        ls -la || true
        
    - name: Run empire generator
      run: node skyscanner-empire.js
      
    - name: Verify output
      run: |
        echo "Output files:"
        find output -name "*.html" | head -5 || echo "No HTML"
        echo "Total: $(find output -name '*.html' 2>/dev/null | wc -l || echo 0)"
        
    - name: Success
      run: echo "✅ Empire deployed - check output folder"
