name: Daily Skyscanner Empire

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Generate empire (NO NPM)
      run: |
        echo "🚀 Pure Node.js deploy - zero deps"
        node skyscanner-empire.js
        
    - name: Verify output
      run: |
        echo "Generated files:"
        find output -name "*.html" | head -10 || echo "No HTML files"
        echo "Total HTML: $(find output -name '*.html' 2>/dev/null | wc -l || echo 0)"
        
    - name: Success badge
      run: echo "::notice title=Success::$(find output -name '*.html' 2>/dev/null | wc -l || echo 0) pages generated"
