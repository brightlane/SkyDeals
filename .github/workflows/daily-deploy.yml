name: Daily Skyscanner Empire

on:
  schedule:
    - cron: '0 2 * * *'  # Daily 2AM UTC
  workflow_dispatch:     # Manual button
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        
    - name: Cache node modules
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-
          
    - name: Install dependencies
      run: npm ci --only=production
      
    - name: Generate fresh pages
      run: npm run deploy
      
    - name: List generated files
      run: |
        echo "Generated pages:"
        ls -la output/*/*.html | head -20
        echo "Total pages: $(find output -name '*.html' | wc -l)"
        
    # VERCEL DEPLOY (Optional - uncomment + add secret)
    #- name: Deploy to Vercel
    #  uses: vercel/action@v1.3.1
    #  with:
    #    vercel-token: ${{ secrets.VERCEL_TOKEN }}
    #    vercel-org-id: ${{ secrets.ORG_ID}}
    #    vercel-project-id: ${{ secrets.PROJECT_ID}}
    #    working-directory: './output'
        
    # NETLIFY DEPLOY (Optional - uncomment + add secrets)
    #- name: Deploy to Netlify
    #  uses: nwtgck/actions-netlify@v3.1
    #  env:
    #    NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
    #    NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
    #  with:
    #    publish-dir: './output'
    
    - name: Success notification
      run: |
        echo "🚀 SUCCESS: $(find output -name '*.html' | wc -l) pages generated"
        echo "::notice::Skyscanner Empire deployed successfully"
        
    - name: Ping Google
      run: |
        curl -s "https://www.google.com/ping?sitemap=https://flights.yourdomain.com/output/sitemap.xml" > /dev/null
        echo "✅ Google pinged"
        
    - name: Ping Bing  
      run: |
        curl -s "https://www.bing.com/ping?sitemap=https://flights.yourdomain.com/output/sitemap.xml" > /dev/null
        echo "✅ Bing pinged"
